# This pity system increases the chance of a Blood Moon the longer it hasn't occurred.
#
# HOW IT WORKS:
#
# 1. Before start_night:
#    - Blood Moon chance is ALWAYS 0%.
#
# 2. From start_night -> linear_end:
#    - Chance increases LINEARLY.
#    - Starts at start_percentage
#    - Ends at linear_end_percentage
#
# 3. After linear_end -> maximum_nights:
#    - Chance increases EXPONENTIALLY.
#
# 4. At maximum_nights:
#    - Blood Moon is essentially GUARANTEED (~100% chance).
#
# NOTES:
# - start_percentage should be very low (e.g. 0.001 = 0.1%)
# - linear_end_percentage controls how fast early progression feels
# - maximum_nights controls the "pity cap" (no more bad luck)
#
# Example Flow:
# Night 1–1  -> 0%
# Night 2    -> 0.1%
# Night 20   -> gradually increasing
# Night 35   -> ~13%
# Night 45   -> ~100%
# =========================

pity_system:
  start_night: 2 # First night where Blood Moon can occur. Nights before these will not spawn a blood moon.
  linear_end: 35 # Night where linear scaling stops
  maximum_nights: 45 # Guaranteed Blood Moon by this night (~100% chance)
  start_percentage: 0.001 # Starting chance at start_night (0.001 = 0.1%)
  linear_end_percentage: 0.13 # Chance at linear_end before exponential scaling


general:
  maximum_lightLevel_spawn: 4 # Max light level allowed for variant mob spawning
  aggro-chance: 0.7


moons:
  default_blood_moon: {} # Default moon (no special mechanics)

  hallowed_moon: {} # Hallowed moon (no special mechanics)

  arcane_moon:
    mechanic_interval: 55 # Interval between arcane mechanics (seconds depending on usage)

    decay:
      duration: 10 # Time window to track healing
      max_damage: 30.0 # Max damage applied after decay

    cripple:
      duration: 4 # Active phase duration
      punish_duration: 8 # Duration of applied negative effects
      grace_period: 2 # Delay before cripple activates


variants:
  zombie:
    hp: 1.4

  skeleton:
    hp: 1.2

  zombie_brute:
    hp: 75.0 # Base health
    scale: 1.4 # Size multiplier
  face_zombie:
    hp: 0.9
    lifesteal: 1.0

  spooky_archer:
    hp: 1.4 # Health multiplier

  spooky_skeleton:
    hp: 1.4

  spook:
    hp: 1.2
    reveal:
      soul_light_radius: 13 # Radius to detect soul light blocks
      player_soul_radius: 6 # Radius to detect players holding soul items

  arcane_evoker:
    hp: 2.0

  arcane_illusioner:
    hp: 2.0